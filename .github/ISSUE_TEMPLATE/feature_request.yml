name: "✨ 機能リクエスト"
description: "新しい機能を提案する"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "解決したい課題"
      description: "どのような課題を解決したいですか？"
      placeholder: "〇〇する際に、毎回△△しなければならず不便"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "提案する解決策"
      description: "どのように解決したいですか？"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "代替案"
      description: "他に検討した方法があれば記載してください"

  - type: textarea
    id: additional
    attributes:
      label: "補足情報"
      description: "その他の情報やスクリーンショットなど"
