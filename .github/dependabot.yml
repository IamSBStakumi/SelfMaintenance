version: 2
updates:
  # npm パッケージの自動更新
  - package-ecosystem: "yarn"
    directory: "/"
    schedule:
      interval: "weekly"
    # PR数を制限
    open-pull-requests-limit: 10
    # コミットメッセージの形式
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions の自動更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
