services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: self-maintenance-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      # ホットリロードが効かない場合に備えて、ポーリングを有効にする設定
      - WATCHPACK_POLLING=true
    tty: true
    stdin_open: true
